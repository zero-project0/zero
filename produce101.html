
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCE 101 JAPAN 新世界</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --accent-blue: #0984e3;
            --debut-gold: #ffd700;
            --up-color: #00b894;
            --down-color: #d63031;
            --text-main: #2d3436;
            --border-light: #f1f2f6;
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f3f5; padding: 20px; color: var(--text-main); }
        .page-title { text-align: center; font-size: 28px; font-weight: 900; color: var(--accent-blue); margin-bottom: 30px; }

        .trainee-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 1400px; margin: 0 auto; }
        .summary-card { 
            background: var(--bg-color); border-radius: 12px; padding: 10px 15px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.3s; border-left: 6px solid var(--accent-blue);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 80px;
        }
        .summary-card.debut-zone { border-left-color: var(--debut-gold); background: #fffdf9; }
        .summary-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

        .rank-num { font-size: 22px; font-weight: 900; color: var(--accent-blue); width: 45px; }
        .debut-zone .rank-num { color: var(--debut-gold); }
        
        .tag-wrap { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
        .tag { font-size: 13px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .tag-national { background: #e0f7fa; color: #0097e6; }
        .tag-global { background: #ffeaa7; color: #d35400; }
        .tag-balance { background: #f3e5f5; color: #8e24aa; }
        .tag-rise { background: #e8f8f5; color: #00b894; }

        .diff-badge { padding: 4px 2px; border-radius: 20px; font-size: 14px; font-weight: bold; min-width: 50px; text-align: center; }
        .diff-up { background: #e6f7e6; color: var(--up-color); }
        .diff-down { background: #fff1f0; color: var(--down-color); }
        .diff-none { background: #f5f5f5; color: #999; }

        /* モーダル */
        .modal-overlay { 
            position: fixed; top:0; left:0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 1000; 
        }
        .modal-content { 
            background: white; width: 1100px; height: 75vh; max-height: 800px; border-radius: 30px; 
            display: flex; overflow: hidden; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .modal-left { width: 320px; background: #fdfdfd; border-right: 1px solid var(--border-light); padding: 30px; display: flex; flex-direction: column; overflow-y: auto;}
        .modal-right { flex: 1; padding: 30px; background: #fff; display: flex; flex-direction: column; gap: 15px; }
        
        .m-rank-display { font-size: 70px; font-weight: 900; color: var(--accent-blue); line-height: 1; margin-bottom: 5px; }
        .m-name-display { font-size: 28px; font-weight: 900; margin: 5px 0; color: #333; }

        .m-tag-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0; }
        .m-tag { font-size: 14px; padding: 6px 14px; border-radius: 30px; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .m-tag-national { background: #e0f7fa; color: #0097e6; }
        .m-tag-global { background: #ffeaa7; color: #d35400; }
        .m-tag-balance { background: #f3e5f5; color: #8e24aa; }
        .m-tag-rise { background: #e8f8f5; color: #00b894; }

        /* RANK HISTORY (縦並び) */
        .history-box { margin-top: 10px; background: #fff; border-radius: 20px; padding: 20px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #f1f2f6; }
        .h-title { font-size: 12px; font-weight: bold; color: #636e72; margin-bottom: 15px; text-align: center; letter-spacing: 2px; }
        .h-timeline { display: flex; flex-direction: column; gap: 5px; position: relative; }
        .h-timeline::before { content: ''; position: absolute; left: 24px; top: 5px; bottom: 5px; width: 2px; background: #dfe6e9; z-index: 0; }

        .h-item { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; border-radius: 12px; padding: 7px 20px; border: 1px solid #eee; transition: 0.2s; }
        .h-item:hover { transform: translateX(5px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .h-item.final { background: linear-gradient(135deg, #0984e3, #00d2ff); color: white; border: none; transform: scale(1.02); box-shadow: 0 6px 12px rgba(9, 132, 227, 0.3); }
        .h-item .ep-lab { font-size: 16px; font-weight: bold; opacity: 0.8; }
        .h-item .ep-rank { font-size: 20px; font-weight: 900; }
        .h-item.final .ep-rank { font-size: 26px; }

        /* 分析セクション - 上下配置用の新しいレイアウト */
        .analysis-container { 
            display: grid; 
            grid-template-columns: 1fr; /* 1列で上下に並べる */
            grid-template-rows: 1fr 1fr; /* 均等に2段 */
            gap: 20px; 
            height: 100%; 
        }
        .vote-section { 
            border: 1px solid #eee; 
            border-radius: 20px; 
            padding: 20px 25px; 
            background: #fff; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; /* 要素を上下に散らす */
        }
        .section-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px;
        }
        .section-title { 
            font-size: 18px; 
            font-weight: 900; 
            color: #2d3436; 
            border-left: 5px solid var(--accent-blue); 
            padding-left: 10px; 
            margin: 0;
        }
        .total-strip { 
            background: #2d3436; 
            color: #fff; 
            padding: 10px 15px; 
            border-radius: 12px; 
            display: flex; 
            gap: 15px;
            align-items: center; 
        }
        .total-strip span { font-size: 14px; font-weight: 900; }
        .total-strip .pt-val { font-size: 20px; font-weight: 900; }

        /* ドーナツグラフと数値を横並びにするコンテナ */
        .vote-content { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 20px; 
            flex: 1;
        }
        .stats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* 国内・海外を横並びに */
            gap: 15px; 
            flex: 1; 
        }
        
        .v-card { 
            background: #fdfdfd; 
            border: 1px solid #f0f0f0; 
            border-radius: 15px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .v-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .v-label { font-size: 12px; color: #999; font-weight: bold; }
        .v-pct-pill { font-size: 14px; font-weight: 900; padding: 4px 10px; border-radius: 12px; }
        
        .v-card-bottom { display: flex; align-items: baseline; gap: 8px;}
        .v-count-big { font-size: 24px; font-weight: 900; color: #2d3436; }
        .v-rank-sub { font-size: 18px; color: var(--accent-blue); font-weight: 900; }

        /* ドーナツグラフのコンテナ */
        .chart-box-doughnut { 
            width: 130px; 
            height: 130px; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
        }
        
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #ccc; border:none; background:none; z-index: 10; padding: 5px; }
        .close-btn:hover { color: #888; }

        .vote-section {
            background: var(--white);
            border-radius: 16px;
            padding: 12px 20px; /* パディングを少し縮小 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
            flex: unset; /* 固定割りを解除 */
        }
        
        /* SNSセクションの追加 */
        .sns-section {
            background: var(--white);
            border-radius: 16px;
            padding: 12px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .sns-card {
            flex: 1;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            padding: 10px 15px;
        }
        .sns-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 2px;
        }
        .sns-val {
            font-size: 20px;
            font-weight: 900;
            color: #1e293b;
        }
        .sns-rank {
            font-size: 18px;
            font-weight: 900;
            color: var(--accent-blue);
            margin-left: 12px;
        }


        /* すべての要素でパディングが幅を壊さないように設定 */
        * {
            box-sizing: border-box;
        }

        /* --- レスポンシブ完全最適化 --- */
        @media (max-width: 1200px) {
            .trainee-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
        }

        @media (max-width: 1024px) {
            .trainee-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            
            /* タブレット・スマホではモーダルを縦並びにして、右側の潰れ（詰まり）を解消 */
            .modal-content { 
                width: 100%; 
                max-width: 700px; /* 縦並びの時はすっきりした幅に制限 */
                height: 95vh; 
                flex-direction: column; 
                overflow-y: auto; 
            }
            .modal-left { 
                width: 100%; 
                border-right: none; 
                border-bottom: 1px solid var(--border-light); 
                padding: 24px; 
                flex-shrink: 0; 
                background: #f8f9fa;
            }
            .modal-right { 
                width: 100%; 
                padding: 24px; 
                overflow-y: visible; /* 親の modal-content でスクロールさせるため */
            }
            .sns-section { 
                flex-direction: column; 
                gap: 12px;
            }
            .sns-card {
                width: 100% !important; /* SNSカードを横いっぱいに広げる */
            }
        }

        @media (max-width: 768px) {
            .page-title { font-size: 22px; margin-bottom: 20px; }
            .trainee-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .summary-card { padding: 12px 10px; }
            
            /* モーダル内の文字サイズや余白の微調整 */
            .modal-content { width: 95%; height: 90vh; }
            .modal-left, .modal-right { padding: 16px; }
            .m-rank-display { font-size: 48px; }
            .m-name-display { font-size: 20px; }
            
            /* 投票セクション内のグリッド調整 */
            .stats-grid { 
                grid-template-columns: 1fr; /* 左右並びを縦並びにして右詰まりを解消 */
                gap: 8px; 
            }
            .vote-content {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }
            .chart-box-doughnut {
                margin: 0 auto; /* ドーナツグラフを中央寄せに */
            }
        }

        @media (max-width: 480px) {
            .trainee-grid { grid-template-columns: 1fr; } /* 完全なスマホ縦持ち用 */
        }
    </style>
</head>

function generateTags(t, isModal = false) {
    let tags = '';
    const diff = t.history[3] - t.history[4];
    const prefix = isModal ? 'm-tag m-tag-' : 'tag tag-';
    
    if (t.nr2 >= 75) tags += `<span class="${prefix}national">#国内型</span>`;
    if (t.nr2 > 65 && t.nr2 < 75) tags += `<span class="${prefix}balance">#バランス型</span>`;
    if (t.gr2 >= 35) tags += `<span class="${prefix}global">#グローバル型</span>`;
    if (diff >= 5) tags += `<span class="${prefix}rise">#急上昇</span>`;
    return tags;
}

function getDiffBadge(diff) {
    if (diff > 0) return `<div class="diff-badge diff-up">▲${diff}</div>`;
    if (diff < 0) return `<div class="diff-badge diff-down">▼${Math.abs(diff)}</div>`;
    return `<div class="diff-badge diff-none">±0</div>`;
}

function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    
    // 現在のソート条件を取得
    const sortValue = document.getElementById('sortSelect').value;
    
    // データのコピーを作成してソート
    let sortedData = [...rawData];
    
    sortedData.sort((a, b) => {
        if (sortValue === 'rank_asc') {
            return a.history[4] - b.history[4];
        } else if (sortValue === 'n2_desc') {
            return b.n2 - a.n2;
        } else if (sortValue === 'g2_desc') {
            return b.g2 - a.g2;
        } else if (sortValue === 'x_desc') {
            return b.x_posts - a.x_posts;
        } else if (sortValue === 'tiktok_desc') {
            return b.tiktok_posts - a.tiktok_posts;
        }
        return 0;
    });

    sortedData.forEach(t => {
        const diff = t.history[3] - t.history[4];
        const card = document.createElement('div');
        card.className = `summary-card ${t.history[4] <= 12 ? 'debut-zone' : ''}`;
        
        // ソート条件に応じて表示するサブ情報を決定
        let subInfoHtml = '';
        if (sortValue === 'n2_desc') {
            subInfoHtml = `<div style="font-size: 12px; color: #0097e6; margin-top: 4px; font-weight: bold;">国内票: ${t.n2.toLocaleString()} pt</div>`;
        } else if (sortValue === 'g2_desc') {
            subInfoHtml = `<div style="font-size: 12px; color: #d35400; margin-top: 4px; font-weight: bold;">海外票: ${t.g2.toLocaleString()} pt</div>`;
        } else if (sortValue === 'x_desc') {
            subInfoHtml = `<div style="font-size: 12px; color: #000; margin-top: 4px; font-weight: bold;">𝕏: ${t.x_posts.toLocaleString()} posts</div>`;
        } else if (sortValue === 'tiktok_desc') {
            subInfoHtml = `<div style="font-size: 12px; color: #ff0050; margin-top: 4px; font-weight: bold;">TikTok: ${t.tiktok_posts.toLocaleString()} posts</div>`;
        }

        card.innerHTML = `
            <div style="display:flex; align-items:center; width: 100%;">
                <div class="rank-num">${t.history[4]}</div>
                <div style="flex: 1;">
                      <div class="name-main" style="font-size: 17px; font-weight: bold; color: var(--text-main);">${t.name}</div>
                    ${subInfoHtml}
                    <div class="tag-wrap">${generateTags(t)}</div>
                </div>
                <div style="margin-left: 10px;">${getDiffBadge(diff)}</div>
            </div>
        `;
        card.onclick = () => openModal(t);
        grid.appendChild(card);
    });
}

let charts = [];
function openModal(t) {
    document.getElementById('mName').innerText = t.name;
    document.getElementById('mRank').innerText = t.history[4];
    document.getElementById('mDiff').innerHTML = getDiffBadge(t.history[3] - t.history[4]);
    document.getElementById('mTags').innerHTML = generateTags(t, true);
    
    document.getElementById('h2').innerText = t.history[0] + "位";
    document.getElementById('h3').innerText = t.history[1] + "位";
    document.getElementById('h5').innerText = t.history[2] + "位";
    document.getElementById('h6').innerText = t.history[3] + "位";
    document.getElementById('h8').innerText = t.history[4] + "位";

    document.getElementById('v1n').innerText = t.n1.toLocaleString();
    document.getElementById('v1g').innerText = t.g1.toLocaleString();
    document.getElementById('r1n').innerText = t.n1_rank + "位";
    document.getElementById('r1g').innerText = t.g1_rank + "位";
    document.getElementById('p1n').innerText = t.nr1 + "%";
    document.getElementById('p1g').innerText = t.gr1 + "%";
    document.getElementById('v1t').innerText = (t.n1 + t.g1).toLocaleString() + " pt";

    document.getElementById('v2n').innerText = t.n2.toLocaleString();
    document.getElementById('v2g').innerText = t.g2.toLocaleString();
    document.getElementById('r2n').innerText = t.n2_rank + "位";
    document.getElementById('r2g').innerText = t.g2_rank + "位";
    document.getElementById('p2n').innerText = t.nr2 + "%";
    document.getElementById('p2g').innerText = t.gr2 + "%";
    document.getElementById('v2t').innerText = (t.n2 + t.g2).toLocaleString() + " pt";

    // SNSデータのセット
    document.getElementById('x_posts').innerText = t.x_posts ? t.x_posts.toLocaleString() : "0";
    document.getElementById('x_rank').innerText = t.x_rank ? t.x_rank + "位" : "--位";
    document.getElementById('tt_posts').innerText = t.tiktok_posts ? t.tiktok_posts.toLocaleString() : "0";
    document.getElementById('tt_rank').innerText = t.tiktok_rank ? t.tiktok_rank + "位" : "--位";


    document.getElementById('modal').style.display = 'flex';

    charts.forEach(c => c.destroy());
    charts = [
        createDoughnut('chart1', [t.nr1, t.gr1]),
        createDoughnut('chart2', [t.nr2, t.gr2])
    ];
}

function createDoughnut(id, data) {
    return new Chart(document.getElementById(id).getContext('2d'), {
        type: 'doughnut',
        data: {
            labels: ['国内', '海外'],
            datasets: [{
                data: data,
                backgroundColor: ['#0097e6', '#ffc000'],
                borderWidth: 0,
                hoverOffset: 10
            }]
        },
        options: {
            maintainAspectRatio: false,
            cutout: '75%',
            plugins: {
                legend: { display: false }
            }
        }
    });
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
renderGrid();
</script>
</body>
